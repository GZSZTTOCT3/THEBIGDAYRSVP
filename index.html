<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>
<style>
    body {
        font-family: 'Georgia', serif;
        text-align: center;
        background: #fdf6f0;
        color: #333;
        margin: 0;
        padding: 0;
    }

    .container {
        padding: 50px 20px;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    h2 {
        font-weight: normal;
        margin-bottom: 30px;
    }

    .names {
        font-size: 36px;
        margin: 20px 0;
        color: #b76e79;
    }

    .details {
        font-size: 18px;
        margin-top: 20px;
        line-height: 1.6;
    }

    .footer {
        margin-top: 40px;
        font-style: italic;
    }

    .card {
        background: white;
        padding: 40px;
        margin: auto;
        max-width: 600px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Together with their families</h2>

        <div class="names">
            Guo Zhaoshuo & Zhang Tiantian
        </div>

        <h1>You're Invited</h1>

        <div class="details">
            to celebrate our wedding<br><br>

            <strong>Date:</strong> 03 October 2026<br>
            <strong>Time:</strong> 6:30 PM<br>
            <strong>Venue:</strong> [VOCO Orchard Singapore by IHG]<br><br>

            Reception to follow
        </div>

        <div class="footer">
            We look forward to celebrating with you 💕
        </div>
    </div>
</div>

</body>
</html>
